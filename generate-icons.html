<!DOCTYPE html>
<html>
<head>
    <title>Generate PWA Icons</title>
    <style>body{font-family:Arial;padding:20px;text-align:center}canvas{border:2px solid #000;margin:10px}button{padding:10px 20px;font-size:16px;cursor:pointer;background:#3b82f6;color:white;border:none;border-radius:5px;margin:10px}</style>
</head>
<body>
    <h2>Generate PWA Icons - Click Download</h2>
    <canvas id="c192" width="192" height="192"></canvas>
    <canvas id="c512" width="512" height="512"></canvas>
    <canvas id="c180" width="180" height="180"></canvas>
    <br>
    <button onclick="download()">Download All Icons</button>
    <p id="msg"></p>

    <script>
        function draw(id, size) {
            const c = document.getElementById(id);
            const ctx = c.getContext('2d');
            const g = ctx.createLinearGradient(0, 0, size, size);
            g.addColorStop(0, '#3b82f6');
            g.addColorStop(1, '#1e40af');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${size/2.5}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🗺️', size/2, size/2);
        }

        draw('c192', 192);
        draw('c512', 512);
        draw('c180', 180);

        function download() {
            const icons = [
                {id: 'c192', name: 'icon-192x192.png'},
                {id: 'c512', name: 'icon-512x512.png'},
                {id: 'c180', name: 'apple-icon.png'}
            ];
            
            icons.forEach(icon => {
                const c = document.getElementById(icon.id);
                const a = document.createElement('a');
                a.download = icon.name;
                a.href = c.toDataURL('image/png');
                a.click();
            });
            
            document.getElementById('msg').innerHTML = '<strong style="color:green">✓ Icons downloaded! Move them to /public folder and restart dev server</strong>';
        }
    </script>
</body>
</html>
